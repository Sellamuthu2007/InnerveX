version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: innervex-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: innervex
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - innervex-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/innervex --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: innervex-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/innervex
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - innervex-network
    volumes:
      - ./backend/logs:/app/logs

  # Frontend (for production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: innervex-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - innervex-network

networks:
  innervex-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
